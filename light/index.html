  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

speaker-notes=\"Una frase. El nombre del sistema y qu\u00e9 es. Sin prisa.\" style=\"background:var(--bg,#08090B);color:#F4F6F8;font-family:'Space Grotesk',sans-serif;overflow:hidden;\">\n    <div style=\"position:absolute;inset:0;padding:128px 120px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.4em;color:var(--accent,#74d4cb);text-transform:uppercase;\">Enterprise Intelligence<\/div>\n      <h1 style=\"font-weight:300;font-size:104px;line-height:1.04;letter-spacing:-0.02em;margin-top:40px;\">Enterprise<br>Operating System<\/h1>\n      <div style=\"font-weight:300;font-size:38px;color:rgba(255,255,255,0.5);margin-top:44px;max-width:1100px;\">One intelligence that runs the company \u2014 and predicts it.<\/div>\n    <\/div>\n    <div style=\"position:absolute;left:120px;bottom:54px;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.28em;color:rgba(255,255,255,0.24);\">ENTERPRISE OS<\/div>\n    <div style=\"position:absolute;right:120px;bottom:54px;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.18em;color:rgba(255,255,255,0.24);\">01 / 15<\/div>\n  <\/section>\n\n  <!-- 02 \u2014 PREMISE -->\n  <section data-label=\"Premise\" data-screen-label=\"02\" data-speaker-notes=\"El punto de partida. Toda empresa ya funciona con miles de procesos invisibles.\" style=\"background:var(--bg,#08090B);color:#F4F6F8;font-family:'Space Grotesk',sans-serif;overflow:hidden;\">\n    <div style=\"position:absolute;inset:0;padding:128px 120px;display:flex;flex-direction:column;justify-content:center;max-width:1500px;\">\n      <div style=\"font-weight:300;font-size:76px;line-height:1.1;letter-spacing:-0.015em;\">Every company already runs on thousands of processes.<\/div>\n      <div style=\"font-weight:300;font-size:40px;line-height:1.35;color:rgba(255,255,255,0.5);margin-top:36px;max-width:1200px;\">Most of them are invisible. The Enterprise OS turns them into one system.<\/div>\n    <\/div>\n    <div style=\"position:absolute;left:120px;bottom:54px;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.28em;color:rgba(255,255,255,0.24);\">THE IDEA<\/div>\n    <div style=\"position:absolute;right:120px;bottom:54px;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.18em;color:rgba(255,255,255,0.24);\">02 / 15<\/div>\n  <\/section>\n\n  <!-- 03 \u2014 ORCHESTRATOR -->\n  <section data-label=\"Orchestrator\" data-screen-label=\"03\" data-speaker-notes=\"Una capa coordinadora por encima de todos los equipos y sistemas.\" style=\"background:var(--bg,#08090B);color:#F4F6F8;font-family:'Space Grotesk',sans-serif;overflow:hidden;\">\n    <div style=\"position:absolute;inset:0;padding:128px 120px;display:flex;flex-direction:column;justify-content:center;max-width:1500px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.34em;color:var(--accent,#74d4cb);text-transform:uppercase;\">The Orchestrator<\/div>\n      <div style=\"font-weight:300;font-size:76px;line-height:1.08;letter-spacing:-0.015em;margin-top:28px;\">One intelligence.<br>Thousands of decisions.<\/div>\n      <div style=\"font-weight:300;font-size:38px;line-height:1.4;color:rgba(255,255,255,0.5);margin-top:36px;max-width:1180px;\">A single coordinating layer sits above every team and every system, routing work and making decisions in real time.<\/div>\n    <\/div>\n    <div style=\"position:absolute;left:120px;bottom:54px;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.28em;color:rgba(255,255,255,0.24);\">THE IDEA<\/div>\n    <div style=\"position:absolute;right:120px;bottom:54px;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.18em;color:rgba(255,255,255,0.24);\">03 / 15<\/div>\n  <\/section>\n\n  <!-- 04 \u2014 AGENTS -->\n  <section data-label=\"Agents\" data-screen-label=\"04\" data-s op:40px;\">\n        <div style=\"display:flex;align-items:baseline;gap:16px;border:1px solid rgba(122,212,203,0.32);border-radius:8px;padding:12px 24px;background:rgba(122,212,203,0.05);\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.3em;color:var(--accent,#74d4cb);\">CRONO<\/span>\n          <span id=\"demo-stopwatch\" style=\"font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-size:46px;font-weight:500;color:#F4F6F8;\">00:00.0<\/span>\n        <\/div>\n        <button id=\"demo-start\" type=\"button\" style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:var(--accent,#74d4cb);background:rgba(122,212,203,0.08);border:1px solid rgba(122,212,203,0.5);border-radius:7px;padding:13px 24px;cursor:pointer;transition:background-color 160ms ease;\">\u25b6 Start<\/button>\n        <button id=\"demo-stop\" type=\"button\" style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.16);border-radius:7px;padding:13px 24px;cursor:pointer;transition:background-color 160ms ease;\">\u25a0 Stop<\/button>\n        <button id=\"demo-reset\" type=\"button\" style=\"font-family:'JetBrains Mono',monospace;font-size:24px;color:rgba(255,255,255,0.45);background:transparent;border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:13px 22px;cursor:pointer;transition:border-color 160ms ease;\">\u21bb Reset<\/button>\n      <\/div>\n      <div style=\"font-weight:300;font-size:50px;letter-spacing:-0.01em;margin-top:40px;\">ROI isn\u2019t measured in money. <span style=\"color:var(--accent,#74d4cb);\">It\u2019s measured in time.<\/span><\/div>\n    <\/div>\n    <div style=\"position:absolute;left:120px;bottom:54px;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.28em;color:rgba(255,255,255,0.24);\">LIVE DEMO<\/div>\n    <div style=\"position:absolute;right:120px;bottom:54px;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.18em;color:rgba(255,255,255,0.24);\">14 / 15<\/div>\n  <\/section>\n\n  <!-- 15 \u2014 CLOSING -->\n  <section data-label=\"Closing\" data-screen-label=\"15\" data-speaker-notes=\"Cierre. La empresa esta despierta. Enterprise Operating System, online.\" style=\"background:var(--bg,#08090B);color:#F4F6F8;font-family:'Space Grotesk',sans-serif;overflow:hidden;\">\n    <div style=\"position:absolute;inset:0;padding:128px 120px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;\">\n      <div style=\"font-weight:300;font-size:96px;line-height:1.05;letter-spacing:-0.02em;\">The company is awake.<\/div>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:28px;letter-spacing:0.42em;color:var(--accent,#74d4cb);margin-top:48px;\">ENTERPRISE OPERATING SYSTEM<\/div>\n      <div style=\"font-weight:300;font-size:32px;color:rgba(255,255,255,0.4);margin-top:20px;\">One brain to execute. One to predict.<\/div>\n    <\/div>\n    <div style=\"position:absolute;left:120px;bottom:54px;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.28em;color:rgba(255,255,255,0.24);\">ENTERPRISE OS<\/div>\n    <div style=\"position:absolute;right:120px;bottom:54px;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.18em;color:rgba(255,255,255,0.24);\">15 / 15<\/div>\n  <\/section>\n\n<\/x-import>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Soft Cyan&quot;, &quot;Emerald&quot;, &quot;Electric Blue&quot;], &quot;default&quot;: &quot;Soft Cyan&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot; },\n  &quot;background&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Near Black&quot;, &quot;True Black&quot;, &quot;Charcoal&quot;], &quot;default&quot;: &quot;Near Black&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot; }\n}\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    this.applyTheme();\n    this.initStopwatch();\n  }\n  componentDidUpdate(){ this.applyTheme(); }\n  applyTheme(){\n    const accents = {'Soft Cyan':'#74d4cb','Emerald':'#60c496','Electric Blue':'#6ea0cd'};\n    const bgs = {'Near Black':'#08090B','True Black':'#000000','Charcoal':'#111317'};\n    const a = accents[this.props.accent] || '#74d4cb';\n    const b = bgs[this.props.background] || '#08090B';\n    const root = document.documentElement;\n    root.style.setProperty('--accent', a);\n    root.style.setProperty('--bg', b);\n  }\n  initStopwatch(){\n    if(this._swInit) return; this._swInit = true;\n    const $ = id => document.getElementById(id);\n    const sw = $('demo-stopwatch');\n    const big = $('demo-bignum');\n    const BASE = 18 * 3600; // 18 man-hours in seconds\n    let t0=null, raf=null, acc=0;\n    const fmt = ms => {\n      const cs = Math.floor(ms/100)%10;\n      const s = Math.floor(ms/1000)%60;\n      const m = Math.floor(ms/60000);\n      return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+cs;\n    };\n    const render = ms => { if(sw) sw.textContent = fmt(ms); if(big){ const sec = ms/1000; big.textContent = sec >= 0.5 ? String(Math.round(BASE/sec)) : '320'; } };\n    const tick = () => { render(acc + (performance.now()-t0)); raf = requestAnimationFrame(tick); };\n    const start = () => { if(t0!==null) return; t0 = performance.now(); tick(); };\n    const stop = () => { if(t0===null) return; acc += performance.now()-t0; t0=null; cancelAnimationFrame(raf); render(acc); };\n    const reset = () => { t0=null; acc=0; cancelAnimationFrame(raf); render(0); };\n    const b1=$('demo-start'), b2=$('demo-stop'), b3=$('demo-reset');\n    if(b1) b1.addEventListener('click', start);\n    if(b2) b2.addEventListener('click', stop);\n    if(b3) b3.addEventListener('click', reset);\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
