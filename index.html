    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {

            const reader = ds.readable.getReader();

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

      template = template.slice(0, i) + resourceScript + template.slice(i);

    // DOMParser/replaceWith are inert per spec — re-create each with

      const s = document.createElement('script');

      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

ly = (i%2===0) ? yc-62 : yc+62;\n          clabelML(ctx, nd.label, nd.x, ly, {size:19, color:WHITE, a:0.7*app, track:1});\n        });\n        if (opts.timestamp) { const app = ease((t-0.1)/0.8); clabel(ctx, opts.timestamp, nodes[0].x, yc-128, {size:34, color:acc, a:0.82*app, weight:400, track:4}); }\n        s.counters.forEach(c => {\n          c.val += c.rate * dt * (0.8 + Math.random()*0.4);\n          const nd = nodes[c.at]; const app = ease((t-1)/1);\n          clabel(ctx, c.label, nd.x, yc+116, {size:15, color:GRAY, a:0.7*app, track:2.5});\n          clabel(ctx, fmtNum(c.val), nd.x, yc+146, {size:28, color:acc, a:0.9*app, weight:500});\n        });\n      }\n    });\n\n    // ---- orchestrator sphere ----\n    const ORCH = {\n      init(s,W,H){\n        s.orbits = Array.from({length:46},()=>({r:110+Math.random()*210, a:Math.random()*TAU, sp:(0.08+Math.random()*0.24)*(Math.random()<0.5?-1:1), tilt:0.4+Math.random()*0.45, sz:Math.random()*1.5+0.5, col:Math.random()<0.3?WHITE:CYAN}));\n        s.conv = Array.from({length:16},()=>({a:Math.random()*TAU, d:560+Math.random()*340}));\n      },\n      draw(ctx,t,s,W,H){\n        const P = PRIM(); const cx = W/2, cy = H/2-10; const build = ease(t/2);\n        const cf = (1 - clamp01(t/3.2)) * 0.13;\n        if (cf > 0) s.conv.forEach(c => { const x=cx+Math.cos(c.a)*c.d, y=cy+Math.sin(c.a)*c.d*0.62, ix=cx+Math.cos(c.a)*72, iy=cy+Math.sin(c.a)*72*0.62; ctx.strokeStyle=rgba(STRUCT,cf); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(ix,iy); ctx.stroke(); });\n        const pulse = 1 + 0.04*Math.sin(t*0.9);\n        glow(ctx, cx, cy, 540*build, P, 0.09);\n        glow(ctx, cx, cy, 280*build*pulse, P, 0.26);\n        glow(ctx, cx, cy, 104*build*pulse, WHITE, 0.72);\n        [[150,0.5,0.13],[215,0.72,-0.09],[300,0.42,0.06]].forEach(r => { ctx.strokeStyle=rgba(CYAN,0.15*build); ctx.lineWidth=1; ctx.beginPath(); ctx.ellipse(cx,cy,r[0]*build,r[0]*r[1]*build,t*r[2]*0.5,0,TAU); ctx.stroke(); });\n        s.orbits.forEach(o => { const a=o.a+t*o.sp*0.55, x=cx+Math.cos(a)*o.r*build, y=cy+Math.sin(a)*o.r*o.tilt*build; dot(ctx,x,y,o.sz,o.col,0.5*build); });\n      }\n    };\n\n    // ---- agent mesh ----\n    const AG = ['Sales','Finance','Legal','Marketing','Support','Operations','Engineering','People','Security'];\n    const SYSn = ['HubSpot','SAP','Salesforce','Slack','Jira','Workspace','Microsoft 365','AWS','Snowflake'];\n    const AGENTS = {\n      init(s){},\n      draw(ctx,t,s,W,H){\n        const P = PRIM(); const cx = 1080, cy = 540, rA = 240, rS = 420; const build = ease(t/1.5);\n        glow(ctx, cx, cy, 420*build, P, 0.08);\n        glow(ctx, cx, cy, 150*build, P, 0.24);\n        glow(ctx, cx, cy, 54*build, WHITE, 0.75);\n        clabel(ctx, 'ORCHESTRATOR', cx, cy+78, {size:15, color:CYAN, a:0.7*build, track:5});\n        const N = AG.length;\n        for (let i=0;i<N;i++) {\n          const ang = (-90 + i*(360/N)) * Math.PI/180;\n          const ax = cx+Math.cos(ang)*rA*build, ay = cy+Math.sin(ang)*rA*build;\n          const sx = cx+Math.cos(ang)*rS*build, sy = cy+Math.sin(ang)*rS*build;\n          ctx.strokeStyle = rgba(STRUCT, 0.12*build); ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(ax,ay); ctx.stroke();\n          ctx.strokeStyle = rgba(STRUCT, 0.07*build); ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(sx,sy); ctx.stroke();\n          const pp = ((t*0.28/(self.cm?1.8:1) + i*0.11) % 1);\n          let px, py;\n          if (pp < 0.55) { const k = ease(pp/0.55); px = lerp(cx,ax,k); py = lerp(cy,ay,k); }\n          else { const k = ease((pp-0.55)/0.45); px = lerp(ax,sx,k); py = lerp(ay,sy,k); }\n          glow(ctx, px, py, 12, CYAN, 0.65*build); dot(ctx, px, py, 1.8, WHITE, 0.82*build);\n          glow(ctx, ax, ay, 34, P, 0.22*build);\n          clabel(ctx, AG[i], ax, ay, {size:19, color:WHITE, a:0.9*build, weight:400, track:1.2});\n          dot(ctx, sx, sy, 2.5, CYAN, 0.7*build);\n          clabel(ctx, SYSn[i], sx, sy + (Math.sin(ang)>=0 ? 24 : -24), {size:15, color:WHITE, a:0.4*build, track:1.5});\n        }\n      }\n    };\n\n    // ---- galaxy (digital twin) ----\n    const GALAXY = {\n      init(s,W,H){\n        s.stars = Array.from({length:340},()=>{ const rr=Math.pow(Math.random(),0.6), arm=(Math.random()*3|0), r=70+rr*640, a=arm*(TAU/3)+rr*3.4+(Math.random()-0.5)*0.55; return {r,a, sp:0.05+0.03*(1-rr), b:0.2+Math.random()*0.6, tw:Math.random()*TAU, sz:Math.random()*1.5+0.4, col:Math.random()<0.25?CYAN:WHITE}; });\n        s.depts = [{l:'Revenue',r:175,a:0.4},{l:'Marketing',r:300,a:1.7},{l:'Sales',r:380,a:2.9},{l:'Manufacturing',r:475,a:4.0},{l:'Logistics',r:560,a:5.2},{l:'Finance',r:250,a:3.5},{l:'Support',r:430,a:0.95}];\n        s.chain = [0,1,2,3,4];\n      },\n      draw(ctx,t,s,W,H){\n        const cx = W/2, cy = H/2-10; const build = ease(t/3.0); const tilt = 0.52; const sp = self.cm?0.45:0.88;\n        glow(ctx, cx, cy, 440*build, PRIM(), 0.08);\n        glow(ctx, cx, cy, 175*build, CYAN, 0.16);\n        glow(ctx, cx, cy, 60*build, WHITE, 0.62);\n        s.stars.forEach(st => { const a=st.a+t*st.sp*sp, x=cx+Math.cos(a)*st.r, y=cy+Math.sin(a)*st.r*tilt, tw=0.5+0.5*Math.sin(t*1.3+st.tw); dot(ctx, x, y, st.sz, st.col, st.b*tw*build); });\n        const dp = s.depts.map(d => ({x:cx+Math.cos(d.a+t*0.05*sp)*d.r, y:cy+Math.sin(d.a+t*0.05*sp)*d.r*tilt, l:d.l}));\n        for (let k=0;k<s.chain.length-1;k++) {\n          const A = dp[s.chain[k]], B = dp[s.chain[k+1]];\n          ctx.strokeStyle = rgba(CYAN, 0.16*build); ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke();\n          const pp = ((t*0.35*sp + k*0.22) % 1); const px = lerp(A.x,B.x,pp), py = lerp(A.y,B.y,pp); glow(ctx, px, py, 12, CYAN, 0.6*build);\n        }\n        dp.forEach(d => { glow(ctx, d.x, d.y, 22, CYAN, 0.4*build); dot(ctx, d.x, d.y, 2.8, WHITE, 0.92*build); clabel(ctx, d.l, d.x, d.y-26, {size:20, color:WHITE, a:0.8*build, weight:400, track:1.2}); });\n      }\n    };\n\n    const EVOLUTION = {\n      init(s){ s.pulses=[]; s.spawn=0; s._lt=undefined; },\n      draw(ctx,t,s,W,H){\n        const dt=s._lt==null?0:Math.min(0.05,t-s._lt); s._lt=t;\n        const P=PRIM(); const N=7, y=566, x0=270, x1=1650;\n        ctx.strokeStyle=rgba(STRUCT,0.13*ease(t/1.5)); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke();\n        for(let i=0;i<N;i++){ const x=x0+(x1-x0)*i/(N-1); const k=i/(N-1); const app=ease((t-0.2-i*0.2)/0.9); if(app<=0)continue; const pls=1+0.09*Math.sin(t*0.6+i); glow(ctx,x,y,(14+40*k)*pls,P,(0.08+0.24*k)*app); dot(ctx,x,y,2.2+2.4*k,WHITE,(0.55+0.4*k)*app); }\n        s.spawn+=dt; const iv=2.6/calmMul(); while(s.spawn>iv && s.pulses.length<1){ s.spawn-=iv; s.pulses.push({p:0,sp:0.085*calmMul()}); }\n        s.pulses=s.pulses.filter(pl=>{ pl.p+=pl.sp*dt; if(pl.p>=1)return false; const x=lerp(x0,x1,pl.p); glow(ctx,x,y,16,P,0.5); dot(ctx,x,y,2,WHITE,0.85); return true; });\n      }\n    };\n\n    const AGES = {\n      init(s){},\n      draw(ctx,t,s,W,H){\n        const P=PRIM(); const build=ease(t/1.5); const y=788; const xs=[384,960,1536];\n        ctx.strokeStyle=rgba(STRUCT,0.2*build); ctx.lineWidth=1.4; ctx.beginPath();\n        for(let i=0;i<=44;i++){ const tt=i/44; const x=lerp(xs[0],xs[2],tt); const yy=y+7*Math.sin(tt*6.283+t*0.3); if(i===0)ctx.moveTo(x,yy); else ctx.lineTo(x,yy); }\n        ctx.stroke();\n        xs.forEach((x,i)=>{ const k=i===2?1:0.45; glow(ctx,x,y,14+14*k,P,(0.16+0.2*k)*build); dot(ctx,x,y,2.2+1.4*k,WHITE,0.7*build); });\n        const cyc=16, tt=t%cyc; let sx;\n        if(tt<6){ sx=lerp(xs[0],xs[2],ease(tt/6)); } else { sx=xs[2]; }\n        const sy=y+7*Math.sin(((sx-xs[0])/(xs[2]-xs[0]))*6.283+t*0.3);\n        if(tt>=6){ const pl=0.4+0.4*Math.sin(t*2.2); glow(ctx,xs[2],y,30,P,0.28*pl*build); }\n        glow(ctx,sx,sy,17,P,0.75*build); dot(ctx,sx,sy,2.2,WHITE,0.9*build);\n      }\n    };\n\n    const TWOBRAINS = {\n      init(s,W,H){ s.pulses=[]; s.spawn=0; s._lt=undefined; s.orb=Array.from({length:20},()=>({r:58+Math.random()*46,a:Math.random()*6.28,sp:(0.2+Math.random()*0.3)*(Math.random()<.5?-1:1),side:Math.random()<.5?0:1,sz:Math.random()*1.3+0.4})); },\n      draw(ctx,t,s,W,H){\n        const dt = s._lt==null?0:Math.min(0.05,t-s._lt); s._lt=t;\n        const P=PRIM(); const build=ease(t/2);\n        const ox=960,oy=222, qx=960,qy=402, lx=560,ly=672, rx=1360,ry=672;\n        s.orb.forEach(o=>{ const cx=o.side?rx:lx, cy=o.side?ry:ly; const a=o.a+t*o.sp; dot(ctx,cx+Math.cos(a)*o.r*build,cy+Math.sin(a)*o.r*0.72*build,o.sz,o.side?CYAN:WHITE,0.5*build); });\n        ctx.strokeStyle=rgba(STRUCT,0.16*build); ctx.lineWidth=1;\n        ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(qx,qy); ctx.stroke();\n        ctx.beginPath(); ctx.moveTo(qx,qy); ctx.lineTo(lx,ly); ctx.stroke();\n        ctx.beginPath(); ctx.moveTo(qx,qy); ctx.lineTo(rx,ry); ctx.stroke();\n        const pulse=1+0.05*Math.sin(t*0.9);\n        glow(ctx,ox,oy,110*build,P,0.15); glow(ctx,ox,oy,38*build,WHITE,0.7);\n        glow(ctx,lx,ly,150*build*pulse,P,0.18); glow(ctx,lx,ly,48*build,WHITE,0.62);\n        glow(ctx,rx,ry,150*build*pulse,P,0.18); glow(ctx,rx,ry,48*build,WHITE,0.62);\n        s.spawn+=dt; const iv=1.5/calmMul();\n        while(s.spawn>iv && s.pulses.length<3){ s.spawn-=iv; s.pulses.push({p:0,sp:(0.17+Math.random()*0.05)*calmMul(),side:Math.random()<0.5?0:1}); }\n        s.pulses=s.pulses.filter(pl=>{ pl.p+=pl.sp*dt; if(pl.p>=1)return false; const tx=pl.side?rx:lx, ty=pl.side?ry:ly; let x,y; if(pl.p<0.45){const k=pl.p/0.45;x=lerp(ox,qx,k);y=lerp(oy,qy,k);}else{const k=(pl.p-0.45)/0.55;x=lerp(qx,tx,k);y=lerp(qy,ty,k);} glow(ctx,x,y,13,P,0.55); dot(ctx,x,y,2,WHITE,0.85); return true; });\n      }\n    };\n\n    const TWINVERSE = {\n      init(s,W,H){\n        s.soc = Array.from({length:90},()=>{ const a=Math.random()*6.2832, r=Math.pow(Math.random(),0.5)*150; return {bx:Math.cos(a)*r, by:Math.sin(a)*r*0.82, ph:Math.random()*6.2832, sp:0.3+Math.random()*0.5, sz:Math.random()*1.5+0.5, wh:Math.random()<0.5}; });\n        s.grid=[]; for(let gx=0;gx<6;gx++) for(let gy=0;gy<4;gy++) s.grid.push({gx,gy});\n        s.pulses=[]; s.spawn=0; s._lt=undefined;\n      },\n      draw(ctx,t,s,W,H){\n        const dt=s._lt==null?0:Math.min(0.05,t-s._lt); s._lt=t;\n        const P=PRIM(); const build=ease(t/2.3);\n        const tx0=960,ty0=212, lcx=560,lcy=556, rcx=1360,rcy=556, dcx=960,dcy=882;\n        ctx.strokeStyle=rgba(STRUCT,0.13*build); ctx.lineWidth=1;\n        [[tx0,ty0,lcx,lcy],[tx0,ty0,rcx,rcy],[lcx,lcy,dcx,dcy],[rcx,rcy,dcx,dcy]].forEach(L=>{ ctx.beginPath(); ctx.moveTo(L[0],L[1]); ctx.lineTo(L[2],L[3]); ctx.stroke(); });\n        glow(ctx,tx0,ty0,84*build,P,0.13); glow(ctx,tx0,ty0,30*build,WHITE,0.68);\n        glow(ctx,lcx,lcy,190*build,P,0.05);\n        s.soc.forEach(p=>{ const x=lcx+p.bx*(1+0.04*Math.sin(t*p.sp+p.ph)); const y=lcy+p.by*(1+0.04*Math.cos(t*p.sp+p.ph)); const tw=0.4+0.4*Math.sin(t*0.8+p.ph); dot(ctx,x,y,p.sz,p.wh?WHITE:CYAN,tw*0.5*build); });\n        const gx0=rcx-150,gy0=rcy-104,sxs=60,sys=66;\n        s.grid.forEach(g=>{ dot(ctx,gx0+g.gx*sxs,gy0+g.gy*sys,1.6,STRUCT,0.5*build); });\n        ctx.strokeStyle=rgba(P,0.62*build); ctx.lineWidth=2.4; ctx.beginPath();\n        for(let i=0;i<=24;i++){ const xx=gx0+(i/24)*(sxs*5); const pr=i/24; const yy=rcy+86-pr*176-12*Math.sin(pr*6+t*0.5); if(i===0)ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy); }\n        ctx.stroke();\n        const conf=ease(t/3)*0.87;\n        glow(ctx,dcx,dcy,120*build,P,0.18); glow(ctx,dcx,dcy,40*build,WHITE,0.75);\n        ctx.lineWidth=1; ctx.strokeStyle=rgba(STRUCT,0.28); ctx.beginPath(); ctx.arc(dcx,dcy,58,0,6.2832); ctx.stroke();\n        ctx.lineWidth=3; ctx.strokeStyle=rgba(P,0.55); ctx.beginPath(); ctx.arc(dcx,dcy,58,-Math.PI/2,-Math.PI/2+conf*6.2832); ctx.stroke();\n        s.spawn+=dt; const iv=1.2/calmMul();\n        while(s.spawn>iv && s.pulses.length<4){ s.spawn-=iv; s.pulses.push({p:0,sp:(0.15+Math.random()*0.05)*calmMul(),side:Math.random()<0.5?0:1}); }\n        s.pulses=s.pulses.filter(pl=>{ pl.p+=pl.sp*dt; if(pl.p>=1)return false; const ccx=pl.side?rcx:lcx, ccy=pl.side?rcy:lcy; let x,y; if(pl.p<0.5){const k=pl.p/0.5;x=lerp(tx0,ccx,k);y=lerp(ty0,ccy,k);}else{const k=(pl.p-0.5)/0.5;x=lerp(ccx,dcx,k);y=lerp(ccy,dcy,k);} glow(ctx,x,y,13,P,0.5); dot(ctx,x,y,2,WHITE,0.8); return true; });\n      }\n    };\n\n    const MAZINGER = {\n      init(s,W,H){ s.parts = Array.from({length:42},()=>({x:Math.random()*W,y:Math.random()*H,sp:5+Math.random()*7,ph:Math.random()*6.28,sz:Math.random()*1.2+0.4})); s.pulses=[]; s.spawn=0; s._lt=undefined; },\n      draw(ctx,t,s,W,H){\n        const dt = s._lt==null ? 0 : Math.min(0.05, t - s._lt); s._lt = t;\n        const P = PRIM(); const build = ease(t/2.2);\n        const sx = 147, y0 = 150, y1 = 958, cy = 388;\n        s.parts.forEach(p => { const y=((p.y - t*p.sp)%H+H)%H; const tw=0.2+0.25*Math.sin(t*0.7+p.ph); dot(ctx, p.x, y, p.sz, WHITE, tw*0.4*build); });\n        const g = ctx.createLinearGradient(sx, y0, sx, y1);\n        g.addColorStop(0, rgba(STRUCT,0)); g.addColorStop(0.5, rgba(STRUCT, 0.18*build)); g.addColorStop(1, rgba(STRUCT,0));\n        ctx.strokeStyle = g; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(sx, y0); ctx.lineTo(sx, y1); ctx.stroke();\n        const pulse = 1 + 0.05*Math.sin(t*0.9);\n        glow(ctx, sx, cy, 150*build*pulse, P, 0.18);\n        glow(ctx, sx, cy, 52*build*pulse, WHITE, 0.55);\n        s.spawn += dt; const iv = 2.2 / calmMul();\n        while (s.spawn > iv && s.pulses.length < 2) { s.spawn -= iv; s.pulses.push({p:0, sp:(0.09+Math.random()*0.03)*calmMul()}); }\n        s.pulses = s.pulses.filter(pl => { pl.p += pl.sp*dt; if (pl.p>=1) return false; const y=lerp(y0,y1,pl.p); glow(ctx, sx, y, 15, P, 0.5); dot(ctx, sx, y, 2, WHITE, 0.85); return true; });\n      }\n    };\n\n    const AWAKEN_NODES = [\n      [520,300,'ERP'],[820,250,'CRM'],[1180,278,'Email'],[1480,360,'Slack'],\n      [360,520,'Warehouse'],[700,460,'Finance'],[1020,440,
